<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fusion Skype Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --accent: #00aff0; --panel: #1c2226; --text: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

        /* --- NAVEGACIÓN INFERIOR --- */
        nav { 
            position: fixed; bottom: 0; width: 100%; height: 60px; 
            background: var(--panel); display: flex; justify-content: space-around; 
            align-items: center; border-top: 1px solid #333; z-index: 1000;
        }
        nav button { 
            background: none; border: none; color: #888; font-size: 12px; 
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        nav button.active { color: var(--accent); }
        nav i { font-size: 20px; font-style: normal; }

        /* --- VISTAS --- */
        .view { display: none; flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 80px; }
        .view.active { display: flex; flex-direction: column; }

        /* Estilos Pestaña 1: Agenda */
        .contact-card { background: var(--panel); padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Estilos Pestaña 2: Chat */
        #msg-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .bubble { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; }
        .in { background: #252b30; align-self: flex-start; }
        .out { background: var(--accent); align-self: flex-end; }
        .chat-input { display: flex; gap: 10px; }

        /* Estilos Pestaña 3: Video */
        #video-grid { position: relative; flex: 1; background: #000; border-radius: 15px; overflow: hidden; }
        #remote-v { width: 100%; height: 100%; object-fit: cover; }
        #local-v { position: absolute; top: 15px; right: 15px; width: 100px; height: 140px; border: 2px solid white; border-radius: 10px; object-fit: cover; }
        .call-tools { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="view-agenda" class="view active">
        <h3>Mi ID: <span id="display-id" style="color:var(--accent)">...</span></h3>
        <div style="background:var(--panel); padding:15px; border-radius:10px; margin-bottom:20px;">
            <input type="text" id="add-name" placeholder="Nombre Amigo" style="width:100%; padding:10px; margin-bottom:10px; background:#252b30; border:none; color:white;">
            <input type="text" id="add-id" placeholder="ID de Amigo" style="width:100%; padding:10px; margin-bottom:10px; background:#252b30; border:none; color:white;">
            <button onclick="guardarContacto()" style="width:100%; background:var(--accent); color:white; border:none; padding:10px; border-radius:5px;">➕ Guardar</button>
        </div>
        <div id="lista-contactos"></div>
    </div>

    <div id="view-chat" class="view">
        <h4 id="chatting-with">Chat con: Nadie</h4>
        <div id="msg-box"></div>
        <div class="chat-input">
            <input type="text" id="input-text" placeholder="Mensaje..." style="flex:1; padding:10px; background:#252b30; border:none; color:white; border-radius:5px;">
            <button onclick="enviarMsg()" style="background:var(--accent); border:none; padding:10px 20px; color:white; border-radius:5px;">📤</button>
        </div>
    </div>

    <div id="view-video" class="view">
        <div id="video-grid">
            <video id="remote-v" autoplay playsinline></video>
            <video id="local-v" autoplay muted playsinline></video>
        </div>
        <div class="call-tools">
            <button onclick="colgar()" style="background:#ff3b30; border:none; color:white; padding:15px; border-radius:50%; width:60px; height:60px; font-size:20px;">❌</button>
        </div>
    </div>

    <nav>
        <button onclick="showView('agenda')" id="btn-agenda" class="active"><i>👤</i>Agenda</button>
        <button onclick="showView('chat')" id="btn-chat"><i>💬</i>Chat</button>
        <button onclick="showView('video')" id="btn-video"><i>📹</i>Video</button>
    </nav>

    <script>
        let peer, conn, currentCall, localStream;
        const msgBox = document.getElementById('msg-box');

        // 1. CONFIGURACIÓN DE ID Y PEER
        const miId = localStorage.getItem('fusion_skype_id') || prompt("Elige tu ID:");
        localStorage.setItem('fusion_skype_id', miId);
        document.getElementById('display-id').innerText = miId;

        peer = new Peer(miId);

        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
            localStream = s;
            document.getElementById('local-v').srcObject = s;
        });

        // Escuchar llamadas y mensajes entrantes
        peer.on('connection', c => { conn = c; setupChat(); showView('chat'); });
        peer.on('call', call => { 
            if(confirm("¿Responder video?")) {
                currentCall = call;
                call.answer(localStream);
                call.on('stream', s => { 
                    document.getElementById('remote-v').srcObject = s;
                    showView('video');
                });
            }
        });

        // 2. FUNCIONES DE VISTA
        function showView(vName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + vName).classList.add('active');
            document.getElementById('btn-' + vName).classList.add('active');
        }

        // 3. AGENDA
        function guardarContacto() {
            const name = document.getElementById('add-name').value;
            const id = document.getElementById('add-id').value;
            let list = JSON.parse(localStorage.getItem('fusion_contacts') || '[]');
            list.push({name, id});
            localStorage.setItem('fusion_contacts', JSON.stringify(list));
            renderAgenda();
        }

        function renderAgenda() {
            const list = JSON.parse(localStorage.getItem('fusion_contacts') || '[]');
            const cont = document.getElementById('lista-contactos');
            cont.innerHTML = "";
            list.forEach(c => {
                cont.innerHTML += `<div class="contact-card">
                    <span><b>${c.name}</b><br><small>${c.id}</small></span>
                    <button onclick="conectar('${c.id}', '${c.name}')" style="background:#28a745; border:none; color:white; padding:8px; border-radius:5px;">Conectar</button>
                </div>`;
            });
        }

        // 4. CONEXIÓN Y CHAT
        function conectar(id, name) {
            document.getElementById('chatting-with').innerText = "Chat con: " + name;
            // Iniciar Video
            currentCall = peer.call(id, localStream);
            currentCall.on('stream', s => document.getElementById('remote-v').srcObject = s);
            // Iniciar Chat
            conn = peer.connect(id);
            setupChat();
            showView('video'); // Por defecto al llamar vamos a video
        }

        function setupChat() {
            conn.on('data', data => addBubble(data, 'in'));
        }

        function enviarMsg() {
            const txt = document.getElementById('input-text').value;
            if(conn && conn.open) {
                conn.send(txt);
                addBubble(txt, 'out');
                document.getElementById('input-text').value = "";
            }
        }

        function addBubble(t, type) {
            const d = document.createElement('div');
            d.className = 'bubble ' + type;
            d.innerText = t;
            msgBox.appendChild(d);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        function colgar() { location.reload(); }

        renderAgenda();
    </script>
</body>
    </html>
