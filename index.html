<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusion Chat - Motor Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --accent: #00aff0; --panel: #1c2226; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; height: 100vh; }
        
        #chat-header { padding: 15px; background: var(--panel); text-align: center; border-bottom: 1px solid #333; font-weight: bold; color: var(--accent); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 15px; position: relative; }
        .out { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }
        .in { background: #2a2f32; align-self: flex-start; border-bottom-left-radius: 2px; }
        .author { font-size: 10px; color: #888; margin-bottom: 4px; display: block; }

        .input-area { padding: 15px; background: var(--panel); display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #252b30; color: white; outline: none; }
        button { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="chat-header">FUSION CHAT</div>
    <div id="chat-window"></div>

    <div class="input-area">
        <input type="text" id="mensaje-txt" placeholder="Escribe un mensaje..." autocomplete="off">
        <button onclick="enviar()">📤</button>
    </div>

    <script>
        // 1. TU CONFIGURACIÓN REAL
        const firebaseConfig = {
            apiKey: "AIzaSyAq0z3fvEEhFAVcl1YNDtB4rV0Lzdd0pZ0",
            authDomain: "fusionchat-37635.firebaseapp.com",
            databaseURL: "https://fusionchat-37635-default-rtdb.firebaseio.com", // URL estándar de Firebase
            projectId: "fusionchat-37635",
            storageBucket: "fusionchat-37635.firebasestorage.app",
            messagingSenderId: "90918145485",
            appId: "1:90918145485:web:984896a83873c96d71c884"
        };

        // Inicializar motor
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. IDENTIFICACIÓN (Se guarda en el navegador)
        const miNombre = localStorage.getItem('chat_user') || prompt("Dime tu nombre para el chat:");
        if(miNombre) localStorage.setItem('chat_user', miNombre);

        // Referencia a la "nube" donde se guardan los mensajes
        const nodoChat = db.ref('mensajes_fusion');

        // 3. RECIBIR MENSAJES (Google nos avisa cuando alguien escribe)
        nodoChat.limitToLast(50).on('child_added', (snapshot) => {
            const m = snapshot.val();
            dibujarMensaje(m.texto, m.usuario === miNombre ? 'out' : 'in', m.usuario);
        });

        // 4. ENVIAR AL MOTOR
        function enviar() {
            const input = document.getElementById('mensaje-txt');
            const texto = input.value.trim();
            if (texto !== "") {
                nodoChat.push({
                    usuario: miNombre,
                    texto: texto,
                    hora: Date.now()
                });
                input.value = "";
            }
        }

        function dibujarMensaje(texto, clase, usuario) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${clase}`;
            div.innerHTML = (clase === 'in' ? `<span class="author">${usuario}</span>` : '') + texto;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        // Enviar con Enter
        document.getElementById('mensaje-txt').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') enviar();
        });
    </script>
</body>
</html>
