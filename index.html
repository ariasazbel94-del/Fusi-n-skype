<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusion Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #080c10;
            --bg2: #0e1318;
            --panel: #111820;
            --panel2: #161e26;
            --accent: #00e5ff;
            --accent2: #7b5ea7;
            --green: #00ff94;
            --red: #ff4466;
            --text: #e8edf2;
            --muted: #4a6070;
            --border: rgba(0,229,255,0.12);
            --glow: 0 0 20px rgba(0,229,255,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* FONDO ANIMADO */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 10% 20%, rgba(0,229,255,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 80%, rgba(123,94,167,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* GRID LINES */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* HEADER */
        header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: rgba(8,12,16,0.95);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 2px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 0 15px rgba(0,229,255,0.3);
        }

        .logo span { color: var(--accent); }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--muted);
            box-shadow: none;
            transition: all 0.4s ease;
            animation: none;
        }

        .status-dot.online {
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-right { display: flex; align-items: center; gap: 10px; }
        .peer-status { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }

        /* NAV */
        nav {
            position: relative;
            z-index: 10;
            display: flex;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 4px;
            gap: 4px;
        }

        nav button {
            flex: 1;
            padding: 11px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        nav button:hover { background: rgba(0,229,255,0.06); color: var(--text); }

        nav button.active {
            background: rgba(0,229,255,0.1);
            color: var(--accent);
            box-shadow: inset 0 0 0 1px rgba(0,229,255,0.2);
        }

        .nav-badge {
            background: var(--red);
            color: white;
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 10px;
            display: none;
        }
        .nav-badge.show { display: inline-block; animation: pop 0.3s ease; }

        @keyframes pop {
            0% { transform: scale(0); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* VISTAS */
        .view {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 5;
        }
        .view.active { display: flex; }

        /* ============ AGENDA ============ */
        #view-agenda { padding: 0; overflow-y: auto; }

        .agenda-inner { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

        /* MI ID BOX */
        .my-id-box {
            background: linear-gradient(135deg, rgba(0,229,255,0.06), rgba(123,94,167,0.06));
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .my-id-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent 340deg, rgba(0,229,255,0.08) 360deg);
            animation: spin 8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .my-id-box > * { position: relative; z-index: 1; }
        .my-id-label { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

        .my-id-value {
            font-family: 'Space Mono', monospace;
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 3px;
            margin: 8px 0;
            text-shadow: 0 0 20px rgba(0,229,255,0.4);
        }

        .copy-btn {
            background: rgba(0,229,255,0.1);
            border: 1px solid rgba(0,229,255,0.25);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .copy-btn:hover { background: rgba(0,229,255,0.2); transform: scale(1.03); }
        .copy-btn:active { transform: scale(0.97); }

        /* ADD CONTACT FORM */
        .add-form {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-title {
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .input-field {
            background: var(--bg2);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 12px 14px;
            color: var(--text);
            border-radius: 10px;
            width: 100%;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            transition: all 0.25s;
            outline: none;
        }

        .input-field:focus {
            border-color: rgba(0,229,255,0.35);
            background: rgba(0,229,255,0.04);
            box-shadow: 0 0 0 3px rgba(0,229,255,0.06);
        }

        .input-field::placeholder { color: var(--muted); }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #0099cc);
            border: none;
            color: #000;
            padding: 13px;
            border-radius: 10px;
            width: 100%;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(0,229,255,0.2);
        }

        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 25px rgba(0,229,255,0.35); }
        .btn-primary:active { transform: translateY(0); }

        /* CONTACT LIST */
        .contacts-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
            padding: 0 2px;
        }

        .contact-item {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 14px 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.25s;
            cursor: pointer;
            gap: 12px;
        }

        .contact-item:hover {
            border-color: rgba(0,229,255,0.25);
            background: var(--panel2);
            transform: translateX(3px);
        }

        .contact-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            flex-shrink: 0;
        }

        .contact-info { flex: 1; min-width: 0; }
        .contact-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-id { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }

        .contact-actions { display: flex; gap: 8px; }

        .btn-talk {
            background: rgba(0,255,148,0.1);
            border: 1px solid rgba(0,255,148,0.25);
            color: var(--green);
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-talk:hover { background: rgba(0,255,148,0.18); transform: scale(1.05); }

        .btn-delete {
            background: rgba(255,68,102,0.08);
            border: 1px solid rgba(255,68,102,0.2);
            color: var(--red);
            padding: 7px 10px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete:hover { background: rgba(255,68,102,0.18); }

        /* ============ CHAT ============ */
        #view-chat { display: none; flex-direction: column; }
        #view-chat.active { display: flex; }

        #chat-header {
            padding: 14px 18px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-avatar {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 15px;
            flex-shrink: 0;
        }

        .chat-title { font-weight: 700; font-size: 15px; }
        .chat-subtitle { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 1px; }

        .conn-indicator {
            margin-left: auto;
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* MESSAGES */
        #messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 16px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .msg {
            max-width: 78%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: slideIn 0.2s ease;
            position: relative;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg .msg-time {
            display: block;
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            opacity: 0.5;
            margin-top: 4px;
        }

        .in {
            background: var(--panel2);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .out {
            background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(0,229,255,0.12));
            border: 1px solid rgba(0,229,255,0.25);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: var(--text);
        }

        .msg-system {
            align-self: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--muted);
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            padding: 6px 14px;
            border-radius: 20px;
            max-width: 90%;
            text-align: center;
        }

        /* INPUT AREA */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 14px 16px;
            background: var(--panel);
            border-top: 1px solid var(--border);
            align-items: flex-end;
        }

        #chat-input {
            flex: 1;
            background: var(--bg2);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 12px 16px;
            color: var(--text);
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: all 0.25s;
            line-height: 1.4;
        }

        #chat-input:focus {
            border-color: rgba(0,229,255,0.3);
            background: rgba(0,229,255,0.03);
            box-shadow: 0 0 0 3px rgba(0,229,255,0.05);
        }

        #chat-input::placeholder { color: var(--muted); }

        .send-btn {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, var(--accent), #0099cc);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,229,255,0.25);
            flex-shrink: 0;
        }

        .send-btn:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(0,229,255,0.4); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

        /* TOAST */
        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: rgba(0,229,255,0.12);
            border: 1px solid rgba(0,229,255,0.3);
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 12px;
            font-family: 'Space Mono', monospace;
            letter-spacing: 1px;
            z-index: 100;
            opacity: 0;
            transition: all 0.3s ease;
            white-space: nowrap;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* EMPTY STATE */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 30px;
            color: var(--muted);
            text-align: center;
        }

        .empty-state .icon { font-size: 36px; opacity: 0.4; }
        .empty-state p { font-size: 13px; font-family: 'Space Mono', monospace; }

        /* TYPING INDICATOR */
        .typing {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 10px 14px;
            background: var(--panel2);
            border: 1px solid var(--border);
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            width: fit-content;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: var(--muted);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* SCROLLBAR AGENDA */
        #view-agenda::-webkit-scrollbar { width: 4px; }
        #view-agenda::-webkit-scrollbar-track { background: transparent; }
        #view-agenda::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        /* ANIMACION ENTRADA */
        .agenda-inner > * {
            animation: fadeUp 0.3s ease both;
        }
        .agenda-inner > *:nth-child(1) { animation-delay: 0.05s; }
        .agenda-inner > *:nth-child(2) { animation-delay: 0.1s; }
        .agenda-inner > *:nth-child(3) { animation-delay: 0.15s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Colores para avatares */
        .av-0 { background: rgba(0,229,255,0.15); color: var(--accent); }
        .av-1 { background: rgba(123,94,167,0.2); color: #b08ad4; }
        .av-2 { background: rgba(0,255,148,0.12); color: var(--green); }
        .av-3 { background: rgba(255,184,0,0.12); color: #ffb800; }
        .av-4 { background: rgba(255,68,102,0.12); color: var(--red); }

        .no-contacts {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            font-family: 'Space Mono', monospace;
            padding: 20px;
            border: 1px dashed rgba(255,255,255,0.08);
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <div class="logo-icon">⚡</div>
            FUSION<span>CHAT</span>
        </div>
        <div class="header-right">
            <span class="peer-status" id="peer-status-text">INICIANDO...</span>
            <div class="status-dot" id="status-dot"></div>
        </div>
    </header>

    <nav>
        <button id="nav-agenda" class="active" onclick="switchView('agenda')">
            📋 AGENDA
        </button>
        <button id="nav-chat" onclick="switchView('chat')">
            💬 CHAT <span class="nav-badge" id="chat-badge">!</span>
        </button>
    </nav>

    <!-- AGENDA -->
    <div id="view-agenda" class="view active">
        <div class="agenda-inner">

            <div class="my-id-box">
                <div class="my-id-label">Tu ID de 10 dígitos</div>
                <div class="my-id-value" id="display-my-id">0000000000</div>
                <button class="copy-btn" onclick="copyId()">📋 COPIAR ID</button>
            </div>

            <div class="add-form">
                <div class="form-title">+ Agregar contacto</div>
                <input class="input-field" type="text" id="new-name" placeholder="Nombre del contacto" maxlength="30">
                <input class="input-field" type="number" id="new-id" placeholder="ID de 10 dígitos">
                <button class="btn-primary" onclick="addContact()">AGREGAR CONTACTO</button>
            </div>

            <div>
                <div class="contacts-label">Contactos guardados</div>
                <div id="contact-list" style="margin-top: 10px; display: flex; flex-direction: column; gap: 8px;"></div>
            </div>

        </div>
    </div>

    <!-- CHAT -->
    <div id="view-chat" class="view">
        <div id="chat-header">
            <div class="chat-avatar av-0" id="chat-avatar" style="display:none">?</div>
            <div>
                <div class="chat-title" id="chat-title">Selecciona un contacto</div>
                <div class="chat-subtitle" id="chat-subtitle">Elige un contacto para chatear</div>
            </div>
            <div class="conn-indicator">
                <div class="status-dot" id="chat-dot"></div>
                <span id="chat-conn-text">sin conexión</span>
            </div>
        </div>

        <div id="messages">
            <div class="empty-state">
                <div class="icon">💬</div>
                <p>Aún no hay mensajes.<br>Selecciona un contacto para empezar.</p>
            </div>
        </div>

        <div class="input-area">
            <textarea id="chat-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
            <button class="send-btn" onclick="sendMsg()" id="send-btn" disabled>➤</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let peer, conn;
        let unreadCount = 0;
        let currentContactName = '';
        let messageHistory = {};

        const COLORS = ['av-0','av-1','av-2','av-3','av-4'];

        function getColor(str) {
            let hash = 0;
            for (let c of str) hash += c.charCodeAt(0);
            return COLORS[hash % COLORS.length];
        }

        function getInitial(name) { return name ? name[0].toUpperCase() : '?'; }

        // ID PERSISTENTE
        let my10DigitId = localStorage.getItem('fusion_10id');
        if (!my10DigitId) {
            my10DigitId = Math.floor(1000000000 + Math.random() * 9000000000).toString();
            localStorage.setItem('fusion_10id', my10DigitId);
        }
        document.getElementById('display-my-id').innerText = my10DigitId;

        // PEERJS
        peer = new Peer(my10DigitId, {
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', () => {
            document.getElementById('status-dot').classList.add('online');
            document.getElementById('peer-status-text').innerText = 'EN LÍNEA';
            showToast('✓ Peer listo');
        });

        peer.on('error', () => {
            document.getElementById('peer-status-text').innerText = 'ERROR';
            showToast('⚠ Error de conexión');
        });

        peer.on('connection', (c) => {
            conn = c;
            const contactName = getContactName(c.peer) || c.peer;
            setupChatEvents(contactName, c.peer);
            showToast('📲 Llamada entrante de ' + contactName);

            if (document.getElementById('view-chat').classList.contains('active')) {
                switchView('chat');
            } else {
                unreadCount++;
                document.getElementById('chat-badge').classList.add('show');
                document.getElementById('chat-badge').innerText = unreadCount;
            }
        });

        function getContactName(id) {
            const contacts = getContacts();
            const c = contacts.find(x => x.id === id);
            return c ? c.name : null;
        }

        // AGENDA
        function getContacts() {
            return JSON.parse(localStorage.getItem('fusion_contacts') || '[]');
        }

        function addContact() {
            const name = document.getElementById('new-name').value.trim();
            const id = document.getElementById('new-id').value.trim();
            if (!name) { showToast('⚠ Escribe un nombre'); return; }
            if (id.length !== 10) { showToast('⚠ El ID debe tener 10 dígitos'); return; }
            if (id === my10DigitId) { showToast('⚠ No puedes agregarte a ti mismo'); return; }

            let contacts = getContacts();
            if (contacts.find(c => c.id === id)) { showToast('⚠ Contacto ya existe'); return; }

            contacts.push({ name, id });
            localStorage.setItem('fusion_contacts', JSON.stringify(contacts));
            renderContacts();
            document.getElementById('new-name').value = '';
            document.getElementById('new-id').value = '';
            showToast('✓ Contacto agregado');
        }

        function deleteContact(id) {
            let contacts = getContacts().filter(c => c.id !== id);
            localStorage.setItem('fusion_contacts', JSON.stringify(contacts));
            renderContacts();
            showToast('🗑 Contacto eliminado');
        }

        function renderContacts() {
            const contacts = getContacts();
            const list = document.getElementById('contact-list');

            if (contacts.length === 0) {
                list.innerHTML = '<div class="no-contacts">Sin contactos aún.<br>Agrega uno arriba ↑</div>';
                return;
            }

            list.innerHTML = '';
            contacts.forEach((c, i) => {
                const colorClass = getColor(c.name);
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.style.animationDelay = (i * 0.05) + 's';
                div.innerHTML = `
                    <div class="contact-avatar ${colorClass}">${getInitial(c.name)}</div>
                    <div class="contact-info">
                        <div class="contact-name">${escapeHtml(c.name)}</div>
                        <div class="contact-id">${c.id}</div>
                    </div>
                    <div class="contact-actions">
                        <button class="btn-talk" onclick="startChat('${c.id}','${escapeHtml(c.name)}')">📞 Hablar</button>
                        <button class="btn-delete" onclick="deleteContact('${c.id}')">✕</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // CHAT
        function startChat(id, name) {
            currentContactName = name;
            const colorClass = getColor(name);

            const avatarEl = document.getElementById('chat-avatar');
            avatarEl.className = 'chat-avatar ' + colorClass;
            avatarEl.innerText = getInitial(name);
            avatarEl.style.display = 'flex';

            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-subtitle').innerText = id;
            document.getElementById('chat-conn-text').innerText = 'conectando...';

            // Limpiar mensajes y mostrar historial si existe
            const msgs = document.getElementById('messages');
            msgs.innerHTML = '';

            if (messageHistory[id]) {
                messageHistory[id].forEach(m => appendMsg(m.text, m.type, m.time, false));
            }

            conn = peer.connect(id);
            setupChatEvents(name, id);
            switchView('chat');
            unreadCount = 0;
            document.getElementById('chat-badge').classList.remove('show');
        }

        function setupChatEvents(name, id) {
            conn.on('open', () => {
                document.getElementById('chat-conn-text').innerText = 'conectado';
                document.getElementById('chat-dot').classList.add('online');
                document.getElementById('send-btn').disabled = false;
                appendSystemMsg('✓ Conexión establecida con ' + name);
            });

            conn.on('data', (data) => {
                appendMsg(data, 'in');
                if (!document.getElementById('view-chat').classList.contains('active')) {
                    unreadCount++;
                    document.getElementById('chat-badge').classList.add('show');
                    document.getElementById('chat-badge').innerText = unreadCount;
                    showToast('💬 Mensaje de ' + name);
                }
            });

            conn.on('close', () => {
                document.getElementById('chat-dot').classList.remove('online');
                document.getElementById('chat-conn-text').innerText = 'desconectado';
                document.getElementById('send-btn').disabled = true;
                appendSystemMsg('⚡ Conexión cerrada');
            });
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (conn && conn.open && text) {
                conn.send(text);
                appendMsg(text, 'out');
                input.value = '';
                input.style.height = 'auto';
            }
        }

        function appendMsg(txt, type, timeStr, save = true) {
            const msgs = document.getElementById('messages');

            // Quitar empty state si existe
            const empty = msgs.querySelector('.empty-state');
            if (empty) empty.remove();

            const now = timeStr || new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = escapeHtml(txt) + '<span class="msg-time">' + now + '</span>';
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;

            // Guardar en historial
            if (save && conn && conn.peer) {
                const peerId = conn.peer;
                if (!messageHistory[peerId]) messageHistory[peerId] = [];
                messageHistory[peerId].push({ text: txt, type, time: now });
            }
        }

        function appendSystemMsg(txt) {
            const msgs = document.getElementById('messages');
            const empty = msgs.querySelector('.empty-state');
            if (empty) empty.remove();

            const div = document.createElement('div');
            div.className = 'msg-system';
            div.innerText = txt;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function switchView(view) {
            const isAgenda = view === 'agenda';
            document.getElementById('view-agenda').classList.toggle('active', isAgenda);
            document.getElementById('view-chat').classList.toggle('active', !isAgenda);
            document.getElementById('nav-agenda').classList.toggle('active', isAgenda);
            document.getElementById('nav-chat').classList.toggle('active', !isAgenda);

            if (!isAgenda) {
                unreadCount = 0;
                document.getElementById('chat-badge').classList.remove('show');
            }
        }

        function copyId() {
            navigator.clipboard.writeText(my10DigitId).then(() => showToast('✓ ID copiado al portapapeles'));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ENTER para enviar, Shift+Enter para nueva línea
        document.getElementById('chat-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMsg();
            }
        });

        // Auto-resize textarea
        document.getElementById('chat-input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        renderContacts();
    </script>
</body>
</html>
