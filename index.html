<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusion Chat - Firebase Motor</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0b0e11; --accent: #00aff0; --panel: #1c2226; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 70%; font-size: 14px; }
        .out { background: var(--accent); align-self: flex-end; }
        .in { background: #2a2f32; align-self: flex-start; }
        .input-area { padding: 15px; background: var(--panel); display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #252b30; color: white; outline: none; }
        button { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
        #status { font-size: 12px; text-align: center; padding: 5px; color: #888; }
    </style>
</head>
<body>

    <div id="status">Conectado al motor Firebase</div>
    <div id="chat-window"></div>

    <div class="input-area">
        <input type="text" id="mensaje-txt" placeholder="Escribe un mensaje...">
        <button onclick="enviar()">📤</button>
    </div>

    <script>
        // 1. CONFIGURACIÓN DEL MOTOR (Pon aquí tus credenciales de Firebase)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            databaseURL: "https://TU_PROYECTO.firebaseio.com",
            projectId: "TU_PROYECTO_ID",
        };

        // Inicializar
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. IDENTIFICACIÓN
        const miNombre = localStorage.getItem('chat_nombre') || prompt("Tu nombre:");
        localStorage.setItem('chat_nombre', miNombre);
        
        // Sala de chat (puedes cambiar 'general' por un nombre de sala privada)
        const salaChat = db.ref('chats/sala_general');

        // 3. RECIBIR MENSAJES EN TIEMPO REAL
        salaChat.limitToLast(20).on('child_added', (snapshot) => {
            const data = snapshot.val();
            mostrarMensaje(data.texto, data.autor === miNombre ? 'out' : 'in');
        });

        // 4. ENVIAR MENSAJE AL MOTOR
        function enviar() {
            const input = document.getElementById('mensaje-txt');
            if (input.value.trim() === "") return;

            salaChat.push({
                autor: miNombre,
                texto: input.value,
                fecha: Date.now()
            });
            input.value = "";
        }

        function mostrarMensaje(texto, clase) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `msg ${clase}`;
            div.innerText = texto;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
